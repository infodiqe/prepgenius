# Local development override — HTTP only, no TLS.
# Docker Compose applies this file automatically alongside docker-compose.yml.
# Do NOT add secrets or production values here.

services:

  # Prod settings module runs behind HTTP-only dev nginx, so turn off HTTPS
  # enforcement. Without this, SECURE_SSL_REDIRECT issues a 301 to https://
  # which the port-80-only proxy cannot satisfy → 502 on every API call.
  django:
    # Re-publish the API to the host for local direct access / Django admin.
    # (Base compose only `expose`s it to the internal network — see RC-03 P0-2.)
    ports:
      - "8000:8000"
    environment:
      SECURE_SSL_REDIRECT: "false"
      SECURE_HSTS_SECONDS: "0"
      SESSION_COOKIE_SECURE: "false"
      CSRF_COOKIE_SECURE: "false"
      # JWT auth cookies must not be Secure over HTTP, or the browser drops
      # them and the user appears logged out after a successful login.
      AUTH_COOKIE_SECURE: "false"
      # Local dev runs the prod settings module with the dev .env (which may
      # carry a short/placeholder key); opt out of the prod SECRET_KEY guard.
      ALLOW_INSECURE_SECRET_KEY: "true"

  # Celery also runs the prod settings module in dev → same opt-out.
  celery-worker:
    environment:
      ALLOW_INSECURE_SECRET_KEY: "true"

  celery-beat:
    environment:
      ALLOW_INSECURE_SECRET_KEY: "true"

  nginx:
    # Bypass docker-entrypoint.sh template processing entirely.
    # nginx starts directly, reading only the HTTP-only dev.conf.
    entrypoint: ["nginx", "-g", "daemon off;"]
    volumes:
      - ./infrastructure/nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro

  certbot:
    # Disable the cert-renewal loop; certs are not used in dev.
    entrypoint: ["/bin/sh", "-c", "echo 'certbot: disabled in dev mode' && exit 0"]
    restart: "no"

  n8n:
    environment:
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
