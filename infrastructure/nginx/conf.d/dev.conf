# Development environment — HTTP only, no TLS required.
# Mirrors production routing so dev behaviour matches prod.
# Loaded only via docker-compose.override.yml (entrypoint bypass).

server {
    listen 80;
    server_name localhost 127.0.0.1;

    client_max_body_size 50M;

    location /static/ {
        alias /var/www/static/;
        expires 1h;
        access_log off;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        expires 1h;
        add_header Cache-Control "private";
    }

    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://django:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/v1/ai/ {
        limit_req zone=tutor burst=5 nodelay;

        proxy_pass         http://django:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://django:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass         http://next:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
