# Development environment — HTTP only, no TLS required.
# Mirrors production routing so dev behaviour matches prod.
# Loaded only via docker-compose.override.yml (entrypoint bypass).

server {
    listen 80;
    server_name localhost 127.0.0.1;

    client_max_body_size 50M;

    # Docker's embedded DNS. Combined with the variables below, this forces
    # nginx to re-resolve upstream container IPs at runtime instead of caching
    # them once at startup — so recreating the django/next container no longer
    # causes a 502 until nginx is reloaded.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $django_upstream django:8000;
    set $next_upstream    next:3000;

    location /static/ {
        alias /var/www/static/;
        expires 1h;
        access_log off;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        expires 1h;
        add_header Cache-Control "private";
    }

    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://$django_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/v1/ai/ {
        limit_req zone=tutor burst=5 nodelay;

        proxy_pass         http://$django_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # Django Admin (server-rendered) — must go to Django, not Next.js.
    location /admin/ {
        proxy_pass         http://$django_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://$django_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass         http://$next_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
