openapi: 3.0.3
info:
  title: PrepGenius API
  version: v1
  description: PrepGenius Competitive Exam Platform API
paths:
  /api/v1/ai-generations/:
    get:
      operationId: v1_ai_generations_list
      description: List AI-generated questions for an exam. Requires content_manager
        or platform_admin role.
      summary: List AI generations
      parameters:
      - in: query
        name: exam_id
        schema:
          type: string
          format: uuid
        description: Filter by exam UUID
        required: true
      - in: query
        name: status
        schema:
          type: string
        description: Filter by generation status (generated, validated, promoted,
          discarded)
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiGeneratedQuestionRead'
          description: ''
        '400':
          description: Missing required query parameter
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
    post:
      operationId: v1_ai_generations_create
      description: Record a new AI generation attempt. Requires content_manager or
        platform_admin role.
      summary: Create AI generation
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiGeneratedQuestionCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AiGeneratedQuestionCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AiGeneratedQuestionCreateRequest'
        required: true
      security:
      - cookieJWT: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiGeneratedQuestionRead'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
  /api/v1/ai-generations/{id}/:
    get:
      operationId: v1_ai_generations_retrieve
      description: Get a single AI generation record by ID. Requires content_manager
        or platform_admin role.
      summary: Retrieve AI generation
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiGeneratedQuestionRead'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: AI generation not found
    patch:
      operationId: v1_ai_generations_partial_update
      description: Partially update an AI generation record. Requires content_manager
        or platform_admin role.
      summary: Update AI generation
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAiGeneratedQuestionUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAiGeneratedQuestionUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAiGeneratedQuestionUpdateRequest'
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiGeneratedQuestionRead'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: AI generation not found
    delete:
      operationId: v1_ai_generations_destroy
      description: Delete an AI generation record. Requires content_manager or platform_admin
        role.
      summary: Delete AI generation
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '204':
          description: No response body
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: AI generation not found
  /api/v1/ai-generations/{id}/promote/:
    post:
      operationId: v1_ai_generations_promote_create
      description: Promote a validated AI generation to a draft question. Requires
        content_manager or platform_admin role.
      summary: Promote AI generation to question
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiGeneratedPromoteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AiGeneratedPromoteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AiGeneratedPromoteRequest'
        required: true
      security:
      - cookieJWT: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionRead'
          description: ''
        '400':
          description: Validation error or invalid AI generation state
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: AI generation not found
  /api/v1/appearances/{id}/:
    delete:
      operationId: v1_appearances_destroy
      description: Delete a question appearance. Requires content_manager or platform_admin
        role.
      summary: Delete question appearance
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '204':
          description: No response body
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Appearance not found
  /api/v1/appearances/create/:
    post:
      operationId: v1_appearances_create_create
      description: Record a question appearance in a previous-year paper. Requires
        content_manager or platform_admin role.
      summary: Create question appearance
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionAppearanceCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuestionAppearanceCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuestionAppearanceCreateRequest'
        required: true
      security:
      - cookieJWT: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionAppearanceRead'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
  /api/v1/attempts/attempts/:
    get:
      operationId: v1_attempts_attempts_list
      description: List exam attempts with optional filters.
      summary: List attempts
      parameters:
      - in: query
        name: exam_id
        schema:
          type: string
          format: uuid
        description: Filter by exam UUID
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status (created, in_progress, submitted, scored)
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExamAttemptRead'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
    post:
      operationId: v1_attempts_attempts_create
      description: Create a new exam attempt (practice session or mock test).
      summary: Create attempt
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamAttemptCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ExamAttemptCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ExamAttemptCreateRequest'
        required: true
      security:
      - cookieJWT: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamAttemptRead'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
  /api/v1/attempts/attempts/{attempt_pk}/answers/:
    get:
      operationId: v1_attempts_attempts_answers_list
      description: Retrieve all answers belonging to an attempt.
      summary: List answers for attempt
      parameters:
      - in: path
        name: attempt_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserAnswerRead'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt not found
  /api/v1/attempts/attempts/{attempt_pk}/answers/bulk-save/:
    post:
      operationId: v1_attempts_attempts_answers_bulk_save_create
      description: Save multiple answers at once for an active attempt.
      summary: Bulk save answers
      parameters:
      - in: path
        name: attempt_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAnswerBulkSaveRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserAnswerBulkSaveRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserAnswerBulkSaveRequest'
        required: true
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserAnswerRead'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt or question not found
  /api/v1/attempts/attempts/{attempt_pk}/answers/save/:
    post:
      operationId: v1_attempts_attempts_answers_save_create
      description: Save a single answer for a question in an active attempt. Idempotent
        (same attempt+question updates existing).
      summary: Save answer
      parameters:
      - in: path
        name: attempt_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAnswerSaveRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserAnswerSaveRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserAnswerSaveRequest'
        required: true
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAnswerRead'
          description: ''
        '400':
          description: Validation error or attempt not in progress
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt or question not found
  /api/v1/attempts/attempts/{id}/:
    get:
      operationId: v1_attempts_attempts_retrieve
      description: Get details of a single exam attempt by ID.
      summary: Retrieve attempt
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoredAttemptDetail'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt not found
  /api/v1/attempts/attempts/{id}/analytics/:
    get:
      operationId: v1_attempts_attempts_analytics_retrieve
      description: Get subject and topic accuracy and average time breakdowns for
        a scored attempt.
      summary: Retrieve attempt analytics
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptAnalytics'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt not found
  /api/v1/attempts/attempts/{id}/results/:
    get:
      operationId: v1_attempts_attempts_results_retrieve
      description: Get result metadata and dynamically computed pass/needs-work status
        for a scored attempt.
      summary: Retrieve attempt results
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptResults'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt not found
  /api/v1/attempts/attempts/{id}/score/:
    post:
      operationId: v1_attempts_attempts_score_create
      description: Score a submitted attempt (transition from submitted to scored).
        Requires content_manager or platform_admin role.
      summary: Score attempt
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoredAttemptDetail'
          description: ''
        '400':
          description: Invalid transition
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt not found
  /api/v1/attempts/attempts/{id}/start/:
    post:
      operationId: v1_attempts_attempts_start_create
      description: Start an exam attempt (transition from created to in_progress).
      summary: Start attempt
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamAttemptRead'
          description: ''
        '400':
          description: Invalid transition or mock test not published
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt not found
  /api/v1/attempts/attempts/{id}/submit/:
    post:
      operationId: v1_attempts_attempts_submit_create
      description: Submit an exam attempt (transition from in_progress to submitted).
      summary: Submit attempt
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamAttemptRead'
          description: ''
        '400':
          description: Invalid transition
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Attempt not found
  /api/v1/attempts/mock-test-questions/{id}/:
    delete:
      operationId: v1_attempts_mock_test_questions_destroy
      description: Remove a question from a mock test. Requires content_manager or
        platform_admin role.
      summary: Remove question from mock test
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '204':
          description: No response body
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Mock test question not found
  /api/v1/attempts/mock-tests/:
    get:
      operationId: v1_attempts_mock_tests_list
      description: List mock tests with optional exam_id and is_published filters.
      summary: List mock tests
      parameters:
      - in: query
        name: exam_id
        schema:
          type: string
          format: uuid
        description: Filter by exam UUID
      - in: query
        name: is_published
        schema:
          type: boolean
        description: Filter by published status
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MockTestRead'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
    post:
      operationId: v1_attempts_mock_tests_create
      description: Create a new mock test. Requires content_manager or platform_admin
        role.
      summary: Create mock test
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockTestCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MockTestCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MockTestCreateRequest'
        required: true
      security:
      - cookieJWT: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockTestRead'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
  /api/v1/attempts/mock-tests/{mock_test_pk}/questions/:
    get:
      operationId: v1_attempts_mock_tests_questions_list
      description: Retrieve all questions belonging to a mock test.
      summary: List questions in mock test
      parameters:
      - in: path
        name: mock_test_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MockTestQuestionRead'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Mock test not found
    post:
      operationId: v1_attempts_mock_tests_questions_create
      description: Add a question to a mock test. Requires content_manager or platform_admin
        role.
      summary: Add question to mock test
      parameters:
      - in: path
        name: mock_test_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockTestQuestionCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MockTestQuestionCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MockTestQuestionCreateRequest'
        required: true
      security:
      - cookieJWT: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockTestQuestionRead'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Mock test or question not found
  /api/v1/attempts/mock-tests/{id}/:
    get:
      operationId: v1_attempts_mock_tests_retrieve
      description: Get a single mock test by ID.
      summary: Retrieve mock test
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockTestRead'
          description: ''
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Mock test not found
    patch:
      operationId: v1_attempts_mock_tests_partial_update
      description: Partially update a mock test. Requires content_manager or platform_admin
        role.
      summary: Update mock test
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMockTestUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMockTestUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMockTestUpdateRequest'
      security:
      - cookieJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockTestRead'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Mock test not found
    delete:
      operationId: v1_attempts_mock_tests_destroy
      description: Delete a mock test. Requires content_manager or platform_admin
        role.
      summary: Delete mock test
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieJWT: []
      responses:
        '204':
          description: No response body
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Mock test not found
  /api/v1/auth/account/delete/:
    delete:
      operationId: auth_account_delete
      summary: Delete (anonymize) user account
      tags:
      - auth
      security:
      - cookieJWT: []
      responses:
        '200':
          description: Account deleted. Auth cookies cleared.
        '400':
          description: Incorrect password
  /api/v1/auth/data/export/:
    post:
      operationId: auth_data_export
      summary: Request a data export (GDPR/DPDP)
      tags:
      - auth
      security:
      - cookieJWT: []
      responses:
        '202':
          description: Data export queued. An email will be sent when ready.
  /api/v1/auth/login/:
    post:
      operationId: auth_login
      summary: Log in with email and password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - cookieJWT: []
      - {}
      responses:
        '200':
          description: Login successful. Access and refresh tokens set as httpOnly
            cookies.
        '401':
          description: Invalid credentials
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout
      summary: Log out and blacklist refresh token
      tags:
      - auth
      security:
      - cookieJWT: []
      responses:
        '200':
          description: Logged out. Auth cookies cleared.
  /api/v1/auth/password/confirm/:
    post:
      operationId: auth_password_reset_confirm
      summary: Confirm password reset with token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - cookieJWT: []
      - {}
      responses:
        '200':
          description: Password reset successfully.
        '400':
          description: Invalid or expired token, or weak password
  /api/v1/auth/password/reset/:
    post:
