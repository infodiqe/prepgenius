components:
  schemas:
    ActionEnum:
      enum:
      - submit
      - claim
      - edit
      - approve
      - reject
      - request_sme
      - publish
      - audit_flag
      type: string
      description: |-
        * `submit` - Submit
        * `claim` - Claim
        * `edit` - Edit
        * `approve` - Approve
        * `reject` - Reject
        * `request_sme` - Request SME
        * `publish` - Publish
        * `audit_flag` - Audit Flag
    AiGeneratedPromoteRequest:
      type: object
      properties:
        stem:
          type: string
          minLength: 1
        subtopic_id:
          type: string
          format: uuid
          description: ID of the subtopic
        explanation:
          type: string
          nullable: true
        difficulty:
          type: integer
          default: 2
        language:
          type: string
          minLength: 1
          default: as
        tags: {}
      required:
      - stem
      - subtopic_id
    AiGeneratedQuestionCreateRequest:
      type: object
      properties:
        exam_id:
          type: string
          format: uuid
          description: ID of the target exam
        subtopic_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the subtopic (if scoped)
        model_used:
          type: string
          minLength: 1
          maxLength: 60
        generation_batch:
          type: string
          format: uuid
          nullable: true
          description: Batch UUID for grouping multiple generations
        prompt:
          type: string
          nullable: true
        constraints_snapshot: {}
        raw_output:
          type: string
          nullable: true
        validation: {}
        credits_charged:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,4})?$
          default: '0.0000'
      required:
      - exam_id
      - model_used
    AiGeneratedQuestionRead:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        exam_id:
          type: string
          format: uuid
          readOnly: true
        subtopic_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        generation_batch:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        model_used:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AiGeneratedQuestionReadStatusEnum'
          readOnly: true
        resulting_question_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - exam_id
      - generation_batch
      - id
      - model_used
      - resulting_question_id
      - status
      - subtopic_id
    AiGeneratedQuestionReadStatusEnum:
      enum:
      - generated
      - validated
      - promoted
      - discarded
      type: string
      description: |-
        * `generated` - Generated
        * `validated` - Validated
        * `promoted` - Promoted
        * `discarded` - Discarded
    AiGeneratedQuestionUpdateStatusEnum:
      enum:
      - generated
      - validated
      - promoted
      - discarded
      type: string
      description: |-
        * `generated` - generated
        * `validated` - validated
        * `promoted` - promoted
        * `discarded` - discarded
    ApprovalLevelEnum:
      enum:
      - reviewer
      - sme
      type: string
      description: |-
        * `reviewer` - Reviewer
        * `sme` - SME
    AttemptAnalytics:
      type: object
      properties:
        attempt_id:
          type: string
          format: uuid
        subjects:
          type: array
          items:
            $ref: '#/components/schemas/AttemptSectionAnalyticItem'
        topics:
          type: array
          items:
            $ref: '#/components/schemas/AttemptSectionAnalyticItem'
      required:
      - attempt_id
      - subjects
      - topics
    AttemptResults:
      type: object
      properties:
        attempt_id:
          type: string
          format: uuid
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          nullable: true
        max_score:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          nullable: true
        correct:
          type: integer
        incorrect:
          type: integer
        skipped:
          type: integer
        accuracy:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        time_taken_seconds:
          type: integer
          nullable: true
        status:
          type: string
        submitted_at:
          type: string
          format: date-time
          nullable: true
        pass_status:
          type: string
      required:
      - accuracy
      - attempt_id
      - correct
      - incorrect
      - max_score
      - pass_status
      - score
      - skipped
      - status
      - submitted_at
      - time_taken_seconds
    AttemptSectionAnalyticItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scope_id:
          type: string
          format: uuid
        name:
          type: string
        total:
          type: integer
        correct:
          type: integer
        accuracy:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        avg_time:
