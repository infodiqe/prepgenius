# PrepGenius AI — Docker Compose (single-VPS, PRD v4 §11, SAD §16)
# Containers: postgres · redis · django · celery-worker · celery-beat · next · n8n

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prepgenius}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-prepgenius}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (broker + cache + rate-limit) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django (API) ───────────────────────────────────────────────────────────
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    # RC-03 (P0-2): the API is NOT published to the host here. In production it
    # must only be reachable through nginx (TLS + rate-limit zones); publishing
    # 8000 binds 0.0.0.0 and bypasses the host firewall (Docker edits iptables).
    # The dev override re-publishes 8000 for local direct access.
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads
      - static:/app/staticfiles
      # Source-controlled seed package (data/seeds/*) lives at the repo root,
      # outside the ./backend build context, so it isn't baked into the image.
      # Mount it read-only so management commands (e.g. seed_questions) can
      # import `data.seeds.*`. data/uploads & data/generated are runtime-only.
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # RC-02B: probe the dedicated unauthenticated, unthrottled liveness
      # endpoint. The previous target (/api/schema/) was heavy and subject to
      # the DRF anon throttle, so the probe itself caused 429s → unhealthy flaps.
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker (all queues) ─────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A config worker
      --loglevel=info
      --queues=default,ai,ingest,analytics
      --concurrency=2
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  # ── Celery Beat (scheduler) ────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── Next.js (frontend) ─────────────────────────────────────────────────────
  next:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - django
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── n8n (automation orchestration — Telegram + WhatsApp reminders) ─────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:?N8N_PASSWORD must be set}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-prepgenius}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      GENERIC_TIMEZONE: Asia/Kolkata
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx (TLS + reverse proxy + rate limits) ──────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Passed to docker-entrypoint.sh envsubst so only ${DOMAIN} is replaced
      # in the .template file; all nginx $variables are left intact.
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_TEMPLATE_VARS: DOMAIN
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Templates dir: entrypoint runs envsubst → writes to /etc/nginx/conf.d/
      - ./infrastructure/nginx/templates:/etc/nginx/templates:ro
      - static:/var/www/static:ro
      - uploads:/var/www/uploads:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - django
      - next
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Certbot (Let's Encrypt auto-renew) ────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ── Automated DB + uploads backups (RC-03 P0-1 · PRD v4 §11) ────────────────
  # Scheduled pg_dump (custom format) + uploads tarball with local retention and
  # an optional off-box sync hook (BACKUP_REMOTE). Reuses the db image so the
  # pg_dump client version matches the server. Off-box copy is mandatory before
  # go-live — set BACKUP_REMOTE (rclone) or sync the db_backups volume off-host.
  db-backup:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'echo "[backup] service up; interval=${BACKUP_INTERVAL_SECONDS:-86400}s"; while true; do sh /scripts/backup.sh || echo "[backup] run failed"; sleep "${BACKUP_INTERVAL_SECONDS:-86400}"; done'
    volumes:
      - db_backups:/backups
      - uploads:/uploads:ro
      - ./infrastructure/scripts:/scripts:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  uploads:
  static:
  n8ndata:
  certbot_conf:
  certbot_www:
  db_backups:
